name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      # CLOUDFLARE_ACCOUNT_ID is set so wrangler can skip the /memberships
      # lookup, which requires `User -> User Details -> Read` on the token
      # (our deploy-scoped token doesn't include that). Account IDs are
      # public identifiers, not credentials.
      - run: npx --yes wrangler@4.87.0 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "082499cdbef2cf208e4f253f66db1609"
